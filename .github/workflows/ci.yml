name: Adraca Synthetic Engine CI

on:
  push:
    branches: [ "main", "Automation" ]
  pull_request:
    branches: [ "main", "Automation" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install flake8 bandit
      - name: Run Flake8
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Run Bandit (Security Scan)
        run: bandit -r src/

  test:
    name: Pytest Compliance Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential graphviz

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt flake8

    - name: Lint Codebase with Flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Print styling warnings (like trailing whitespace or long lines) but do not halt the pipeline
        flake8 src/ tests/ --count --max-line-length=200 --statistics --exit-zero

    - name: Run Privacy & Synthesizer Tests
      run: |
        PYTHONPATH=. pytest tests/ -v

  build-offline-image:
    name: Build & Export Offline K8s Artifacts
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Automation')

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Build Optimized Adraca Docker Image
      run: |
        docker build -t adraca:latest .
        
    - name: Compress Image for Air-Gapped Transport
      run: |
        docker save adraca:latest -o adraca-offline-image.tar
        
    - name: Stage Kubernetes Manifests
      run: |
        mkdir -p deploy-bundle
        mv adraca-offline-image.tar deploy-bundle/
        cp -r kubernetes deploy-bundle/
        
    - name: Upload Air-Gapped Release Bundle
      uses: actions/upload-artifact@v4
      with:
        name: adraca-k8s-offline-bundle
        path: deploy-bundle/
        retention-days: 7
